<h1>Student List</h1>
<a href="/add/">Add Student</a>

<ul>
  {% for student in students %}
    <li>
      {{ student.name }} - {{ student.email }} - {{ student.course }}
      <a href="/update/{{ student.id }}">Edit</a>
      <a href="/delete/{{ student.id }}">Delete</a>
    </li>
  {% endfor %}
</ul>
